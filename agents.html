<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents — Clawd Control</title>
</head>
<body>
    <main class="main">
        <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px">
            <div>
                <h1>Agents</h1>
                <p class="subtitle">Agent fleet status and per-agent workspace.</p>
            </div>
            <a href="/create.html" class="btn-new-agent">
                <i data-lucide="plus" style="width:14px;height:14px"></i>
                New Agent
            </a>
        </div>

        <div class="agent-cards-grid" id="agentCardsGrid">
            <!-- Agent cards will be injected here -->
            <div class="card">
                <h2 class="card-title">Loading Agents...</h2>
            </div>
        </div>

        <style>
            .page-header { margin-bottom: 24px; }
            .page-header h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--text-primary); text-shadow: 0 0 8px rgba(245, 158, 11, 0.5); }
            .page-header .subtitle { font-size: 13px; font-weight: 400; color: var(--text-secondary); margin-top: 4px; }

            .agent-cards-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
            }
            .btn-new-agent {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 6px 14px;
                border-radius: 9999px;
                background: var(--surface);
                border: 1px solid var(--border-subtle);
                color: var(--text-secondary);
                font-size: 13px;
                font-weight: 500;
                text-decoration: none;
                transition: all 150ms;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .btn-new-agent:hover {
                border-color: #f59e0b;
                color: var(--text-primary);
            }

            .card {
                background: var(--surface);
                border: 1px solid var(--border-subtle);
                border-radius: var(--radius-md, 10px);
                padding: 16px;
                display: flex;
                flex-direction: column;
                transition: all 150ms;
                text-decoration: none;
                color: inherit;
            }
            .card:hover {
                border-color: var(--border);
                transform: translateY(-1px);
                box-shadow: var(--shadow-md);
            }
            .card-title { font-size: 1.25rem; font-weight: 600; margin-bottom: 20px; color: var(--text-primary); }
            .agent-header {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 12px;
            }
            .agent-header .agent-emoji { font-size: 1.8rem; line-height: 1; }
            .agent-header .agent-name { font-size: 1.1rem; font-weight: 700; color: var(--text-primary); }
            .agent-header .agent-name-wrap { display: inline-flex; align-items: center; }
            .agent-details-list {
                list-style: none; padding: 0; margin: 0;
            }
            .agent-details-list li {
                display: flex; justify-content: space-between; align-items: center;
                padding: 8px 0; border-bottom: 1px dashed var(--border-subtle);
                font-size: 0.9rem;
            }
            .agent-details-list li:last-child { border-bottom: none; }
            .agent-details-list .label { color: var(--text-secondary); }
            .agent-details-list .value { color: var(--text-primary); text-align: right; font-variant-numeric: tabular-nums; }
            .agent-details-list .value.small-text { font-size: 0.8rem; }
            .empty-state {
                text-align: center;
                padding: 60px 24px;
                color: var(--text-secondary);
                font-size: 0.85rem;
            }
        </style>

        <script>
            function initAgentsTab() {
                const FETCH_OPTS = { credentials: 'same-origin' };
                const fmtBytes = window.fmtBytes || ((b) => {
                    if (b > 1e9) return (b / 1e9).toFixed(1) + 'GB';
                    if (b > 1e6) return (b / 1e6).toFixed(0) + 'MB';
                    return (b / 1e3).toFixed(0) + 'KB';
                });

                async function fetchAndRenderAgents() {
                    try {
                        const response = await fetch('/api/agents', FETCH_OPTS);
                        const agentsData = await response.json();
                        renderAgentCards(agentsData);
                    } catch (error) {
                        console.error('Failed to fetch agent data:', error);
                        document.getElementById('agentCardsGrid').innerHTML = '<div class="card"><h2 class="card-title">Error loading agents.</h2><p>Please check server logs.</p></div>';
                    }
                }

                function renderAgentCards(agents) {
                    const grid = document.getElementById('agentCardsGrid');
                    grid.innerHTML = ''; // Clear loading message

                    if (!Array.isArray(agents) || agents.length === 0) {
                        grid.innerHTML = '<div class="empty-state"><p>No agents configured</p></div>';
                        return;
                    }

                    for (const agent of agents) {
                        const agentCard = document.createElement('a');
                        agentCard.className = 'card';
                        agentCard.id = `agent-card-${agent.id}`;
                        agentCard.href = `/agent/${encodeURIComponent(agent.id)}`;
                        agentCard.style.cursor = 'pointer';

                        const formatDuration = (ms) => {
                            if (ms === undefined || ms === null || isNaN(ms)) return '--';
                            const seconds = Math.floor(ms / 1000);
                            const minutes = Math.floor(seconds / 60);
                            const hours = Math.floor(minutes / 60);
                            const days = Math.floor(hours / 24);
                            let parts = [];
                            if (days > 0) parts.push(`${days}d`);
                            if (hours % 24 > 0) parts.push(`${hours % 24}h`);
                            if (minutes % 60 > 0) parts.push(`${minutes % 60}m`);
                            if (parts.length === 0) return '0m';
                            return parts.join(' ');
                        };

                        const statusDot = agent.activeSessionId
                            ? '<span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-left:6px;flex-shrink:0"></span>'
                            : '<span style="width:8px;height:8px;border-radius:50%;background:var(--text-tertiary);display:inline-block;margin-left:6px;flex-shrink:0"></span>';

                        agentCard.innerHTML = `
                            <div class="agent-header">
                                <span class="agent-emoji">${agent.emoji || '🤖'}</span>
                                <span class="agent-name-wrap"><span class="agent-name">${agent.name || agent.id}</span>${statusDot}</span>
                            </div>
                            <ul class="agent-details-list">
                                <li><span class="label">Model:</span> <span class="value">${agent.model || 'N/A'}</span></li>
                                <li><span class="label">Workspace:</span> <span class="value small-text">${agent.workspacePath || 'N/A'}</span></li>
                                <li><span class="label">Workspace Size:</span> <span class="value">${fmtBytes(agent.workspaceSize || 0)}</span></li>
                                <li><span class="label">Active Session:</span> <span class="value">${agent.activeSessionId ? `${agent.activeSessionId.substring(0, 8)} (${formatDuration(Date.now() - new Date(agent.activeSessionStarted).getTime())} ago)` : 'None'}</span></li>
                                <li><span class="label">Today's Tokens:</span> <span class="value">${agent.todayTokens || 0}</span></li>
                                <li><span class="label">Today's Spend:</span> <span class="value">$${(agent.todaySpend || 0).toFixed(4)}</span></li>
                                <li><span class="label">Session Count:</span> <span class="value">${agent.sessionCount || 0}</span></li>
                            </ul>
                        `;
                        grid.appendChild(agentCard);
                    }
                }

                // Fetch data initially
                fetchAndRenderAgents();

                // Refresh data on snapshot updates from SSE
                if (window.__agentsSnapshotHandler) {
                    document.removeEventListener('layout:snapshot', window.__agentsSnapshotHandler);
                }
                window.__agentsSnapshotHandler = fetchAndRenderAgents;
                document.addEventListener('layout:snapshot', window.__agentsSnapshotHandler);
            }

            initAgentsTab();
        </script>
    </main>
    <script src="/layout.js"></script>
    <script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
